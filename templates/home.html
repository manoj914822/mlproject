```html
<!DOCTYPE html>
<html>
<head>
<title>Prediction Page</title>
</head>

<body style="text-align:center;font-family:Arial">

<h1>Student Exam Performance Prediction</h1>

<form action="{{ url_for('predict_datapoint') }}" method="post">

<label>Gender</label>
<select name="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<br><br>

<label>Race or Ethnicity</label>
<select name="race_ethnicity">
<option value="group A">Group A</option>
<option value="group B">Group B</option>
<option value="group C">Group C</option>
<option value="group D">Group D</option>
<option value="group E">Group E</option>
</select>

<br><br>

<label>Parental Level of Education</label>
<select name="parental_level_of_education">
<option value="bachelor's degree">Bachelor's</option>
<option value="master's degree">Master's</option>
<option value="associate's degree">Associate</option>
<option value="high school">High School</option>
</select>

<br><br>

<label>Lunch</label>
<select name="lunch">
<option value="standard">Standard</option>
<option value="free/reduced">Free/Reduced</option>
</select>

<br><br>

<label>Test Preparation Course</label>
<select name="test_preparation_course">
<option value="none">None</option>
<option value="completed">Completed</option>
</select>

<br><br>

<label>Reading Score</label>
<input type="number" name="reading_score" min="0" max="100" required>

<br><br>

<label>Writing Score</label>
<input type="number" name="writing_score" min="0" max="100" required>

<br><br>

<input type="submit" value="Predict Score">

</form>

<h2>{{result}}</h2>

</body>
</html>
```
